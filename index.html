<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3. Sınıf Matematik Oyunu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .quiz-wrap { max-width: 580px; width: 100%; }
  h1 { text-align: center; font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 1.25rem; }
  .progress-bar { background: #e0e0e0; border-radius: 99px; height: 8px; overflow: hidden; margin-bottom: 1.5rem; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; }
  .question-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1.5rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .question-text { font-size: 17px; font-weight: 600; color: #1a1a1a; line-height: 1.6; margin-bottom: 1.25rem; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-btn { background: #f4f6f8; border: 1px solid #d0d0d0; border-radius: 10px; padding: 14px 12px; font-size: 15px; color: #1a1a1a; cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .opt-btn:hover:not(:disabled) { background: #fff; border-color: #999; }
  .opt-btn.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
  .opt-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
  .opt-btn:disabled { cursor: default; }
  .feedback { font-size: 14px; padding: 10px 14px; border-radius: 8px; margin-top: 12px; display: none; line-height: 1.5; }
  .feedback.show { display: block; }
  .feedback.ok { background: #EAF3DE; color: #3B6D11; }
  .feedback.fail { background: #FCEBEB; color: #A32D2D; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .soru-info { font-size: 13px; color: #666; }
  .next-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; display: none; }
  .next-btn.show { display: block; }
  .next-btn:hover { background: #0F6E56; }
  .result-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 14px; padding: 2rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .score-circle { width: 90px; height: 90px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 28px; font-weight: 700; color: #0F6E56; }
  .result-title { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .result-sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .restart-btn { background: #1D9E75; color: white; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .restart-btn:hover { background: #0F6E56; }
  .star { color: #EF9F27; font-size: 24px; letter-spacing: 6px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="quiz-wrap">
  <h1>🧮 3. Sınıf Matematik Oyunu</h1>
  <div id="quiz-area"></div>
</div>
<script>
const questions = [
  {
    q: "Bir çocuk her gün 4 sayfa kitap okuyor. Bu çocuk 2 haftada toplam kaç sayfa okur?",
    opts: ["42 sayfa", "56 sayfa", "48 sayfa", "28 sayfa"],
    answer: 1,
    explain: "1 hafta = 7 gün, 2 hafta = 14 gün. 14 × 4 = 56 sayfa ✓"
  },
  {
    q: "Bir markette 3 paket bisküvi 18 liraya satılıyor. 1 paket bisküvi kaç liraya satılır?",
    opts: ["4 lira", "6 lira", "5 lira", "9 lira"],
    answer: 1,
    explain: "18 ÷ 3 = 6 lira. Her paket 6 liraya satılıyor ✓"
  },
  {
    q: "Bir sınıfta 5 sıra var. Her sırada 6 öğrenci oturuyor. Sınıfta toplam kaç öğrenci vardır?",
    opts: ["11 öğrenci", "25 öğrenci", "30 öğrenci", "36 öğrenci"],
    answer: 2,
    explain: "5 × 6 = 30 öğrenci ✓"
  },
  {
    q: "Bir çiftçinin 24 tavuğu var. Tavukları eşit olarak 4 kümese koyacak. Her kümese kaç tavuk düşer?",
    opts: ["4 tavuk", "8 tavuk", "6 tavuk", "5 tavuk"],
    answer: 2,
    explain: "24 ÷ 4 = 6 tavuk. Her kümes için 6 tavuk düşer ✓"
  },
  {
    q: "Bir fırın her gün 7 tepsi kurabiye pişiriyor. Her tepside 8 kurabiye var. Fırın 3 günde kaç kurabiye pişirir?",
    opts: ["56 kurabiye", "168 kurabiye", "84 kurabiye", "140 kurabiye"],
    answer: 1,
    explain: "Günde: 7 × 8 = 56 kurabiye. 3 günde: 56 × 3 = 168 kurabiye ✓"
  }
];

let current = 0, score = 0, answered = false;

function render() {
  const area = document.getElementById('quiz-area');
  if (current >= questions.length) { renderResult(area); return; }
  const q = questions[current];
  area.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(current/questions.length)*100}%"></div></div>
    <div class="question-card">
      <div class="question-text">${q.q}</div>
      <div class="options-grid">
        ${q.opts.map((o,i) => `<button class="opt-btn" onclick="pick(${i})">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>
    <div class="nav-row">
      <span class="soru-info">Soru ${current+1} / ${questions.length} &nbsp;·&nbsp; Puan: ${score}</span>
      <button class="next-btn" id="nxt" onclick="next()">${current < questions.length-1 ? 'Sonraki soru →' : 'Sonucu gör →'}</button>
    </div>
  `;
  answered = false;
}

function pick(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === q.answer) {
    score++;
    btns[i].classList.add('correct');
    fb.className = 'feedback show ok';
    fb.textContent = '🎉 Harika! ' + q.explain;
  } else {
    btns[i].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'feedback show fail';
    fb.textContent = '💡 Doğru cevap: ' + q.opts[q.answer] + ' — ' + q.explain;
  }
  document.getElementById('nxt').classList.add('show');
}

function next() { current++; render(); }

function stars(s, t) {
  const p = s/t;
  const n = p >= 0.8 ? 3 : p >= 0.6 ? 2 : p >= 0.4 ? 1 : 0;
  return '★'.repeat(n) + '☆'.repeat(3-n);
}

function renderResult(area) {
  const total = questions.length;
  const pct = Math.round((score/total)*100);
  const msg = score === total ? 'Mükemmel! Hepsini doğru yaptın! 🏆' : score >= 3 ? 'Çok iyi! Biraz daha pratik yapalım. 👏' : 'Devam et, her gün biraz daha iyi olacaksın! 💪';
  area.innerHTML = `
    <div class="result-card">
      <div class="score-circle">${score}/${total}</div>
      <div class="star">${stars(score,total)}</div>
      <div class="result-title">${msg}</div>
      <div class="result-sub">Doğru: ${score} &nbsp;·&nbsp; Yanlış: ${total-score} &nbsp;·&nbsp; Başarı: %${pct}</div>
      <button class="restart-btn" onclick="restart()">🔄 Tekrar oyna</button>
    </div>
  `;
}

function restart() { current = 0; score = 0; render(); }
render();
</script>
</body>
</html>
